<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Empleados</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4 fw-bold">Lista de Empleados</h2>

      <div class="card shadow-lg rounded-4">
        <div class="card-body">
          <table class="table table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>Número</th>
                <th>Nombre</th>
                <th>Departamento</th>
                <th>Salario</th>
                <th>Acción</th>
              </tr>
            </thead>

            <tbody id="tablaEmpleados"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalNomina" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Detalle de Nómina</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body" id="contenidoNomina"></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
